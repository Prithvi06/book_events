<div class="page">
  <div class="header">
    <h2 class="title">Admin Timeslot Management</h2>
    <button mat-flat-button color="primary" (click)="openAddSlot()">Add Slot</button>
  </div>

  <div class="loading" *ngIf="loading">
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
  </div>

  <table mat-table [dataSource]="dataSource" matSort *ngIf="!loading">
    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Category</th>
      <td mat-cell *matCellDef="let row">{{ row.category }}</td>
    </ng-container>

    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
      <td mat-cell *matCellDef="let row">{{ row.start_time | date: 'mediumDate' }}</td>
    </ng-container>

    <ng-container matColumnDef="start">
      <th mat-header-cell *matHeaderCellDef>Start Time</th>
      <td mat-cell *matCellDef="let row">
        {{ row.start_time | date: 'shortTime' : undefined : 'en-IN' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="end">
      <th mat-header-cell *matHeaderCellDef>End Time</th>
      <td mat-cell *matCellDef="let row">
        {{ row.end_time | date: 'shortTime' : undefined : 'en-IN' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="bookedBy">
      <th mat-header-cell *matHeaderCellDef>Booked By</th>
      <td mat-cell *matCellDef="let row">{{ bookedByLabel(row) }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row" class="actions">
        <button mat-stroked-button color="warn" (click)="deleteSlot(row)" aria-label="Delete">
          Delete
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
